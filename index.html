<!DOCTYPE html>
<html>
<head>

<title>Physics Quiz - Jitu Sir</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.question{
margin-top:25px;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
}

#timer{
font-size:20px;
color:red;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Physics Quiz</h1>
<h3 style="text-align:center;">Created by Jitu Sir</h3>

<div id="timer">60:00</div>

<br>

Name:
<input type="text" id="name" required>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

</div>

<script>

var questions=[

{
q:"Velocity becomes zero when derivative of displacement is zero. If x=t³−6t²+9t find time.",
o:["1 s","2 s","3 s","1 and 3"],
a:1
},

{
q:"In SHM if mass becomes 4 times frequency becomes?",
o:["w/2","w","2w","w/4"],
a:0
},

{
q:"Capillary rise if radius doubles becomes?",
o:["h","h/2","h/4","2h"],
a:1
}

];

questions.sort(()=>Math.random()-0.5);

var quizDiv=document.getElementById("quiz");

questions.forEach((q,i)=>{

var html="<div class='question'>";
html+="<p><b>Q"+(i+1)+". "+q.q+"</b></p>";

q.o.forEach((opt,j)=>{
html+="<label><input type='radio' name='q"+i+"' value='"+j+"'> "+opt+"</label><br>";
});

html+="</div>";

quizDiv.innerHTML+=html;

});

var time=3600;

setInterval(function(){

var min=Math.floor(time/60);
var sec=time%60;

document.getElementById("timer").innerHTML=min+":"+(sec<10?"0":"")+sec;

time--;

},1000);

function submitQuiz(){

var correct=0;
var wrong=0;
var unattempted=0;

questions.forEach((q,i)=>{

var ans=document.querySelector("input[name='q"+i+"']:checked");

if(!ans){
unattempted++;
}

else if(parseInt(ans.value)===q.a){
correct++;
}

else{
wrong++;
}

});

var score=(correct*4)-(wrong*1);

var name=document.getElementById("name").value;

fetch("https://docs.google.com/spreadsheets/d/1qkV78FsNl6jOPFVmBuMQQmXgimknXFrseOBKU0l2XI8/edit?gid=0#gid=0",{

method:"POST",

body:new URLSearchParams({

name:name,
score:score,
correct:correct,
wrong:wrong,
unattempted:unattempted

})

});

alert("Quiz submitted successfully!");

}

</script>

</body>
</html>
